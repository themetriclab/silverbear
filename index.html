        <h1>Wildlife Discovered — Wildlife Photography Tours in Canada</h1>
        <p>Join small group wildlife photography tours designed for passionate photographers who crave authentic, once-in-a-lifetime moments in nature. From rugged Arctic tundra to remote boreal landscapes, our guided expeditions focus on real wildlife encounters — not zoos, enclosures, or staged settings.</p>
        <h2>Our Photography Tours</h2>
        <p>Loon Photography Tours in Northern Ontario — photograph common loons and their chicks from a purpose-built boat on pristine northern lakes. Algonquin Park Wildlife Photography Tours — capture moose, bald eagles, loons, and boreal wildlife by boat in Ontario's world-renowned Algonquin Park. Polar Bear Photography Tours in Churchill, Manitoba — photograph polar bears and Arctic wildlife at ground level in the polar bear capital of the world. Waterfowl and Swan Photography Workshops — photograph diving ducks, fighting swans, osprey, terns, and tender swan families from a custom-built low-angle photography boat.</p>
        <h2>About Erik Bertelsen</h2>
        <p>Erik Bertelsen is a professional wildlife guide, photographer, and videographer specializing in unique and wildlife-rich environments across Canada. With years of field experience, he leads guided photography tours that offer safe, well-organized access to wild animals in their natural habitats — helping clients create powerful images while deepening their connection to the natural world.</p>
        <p>Contact us at wildlifediscovered@outlook.com to plan your next wildlife photography adventure.</p>
